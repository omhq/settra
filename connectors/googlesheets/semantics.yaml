plugin: googlesheets
version: 1
generated_by: ai
validated: false
ignored_column_postfixes:
  - _ctx
  - sp_ctx
  - tab_color
  - tab_color_style
  - copy_requires_writer_permission
  - drive_id
  - explicitly_trashed
  - has_thumbnail
  - icon_link
  - is_app_authorized
  - thumbnail_version
  - trashed
  - trashed_time
  - viewers_can_copy_content
  - writers_can_share
  - banded_ranges
  - basic_filter
  - column_groups
  - conditional_formats
  - data_source_sheet_properties
  - developer_metadata
  - filter_views
  - merges
  - row_groups
  - slicers
  - export_links
  - link_share_metadata
  - modified_by_me
  - modified_by_me_time
  - permission_ids
  - properties
  - quota_bytes_used
  - spaces
  - starred
  - thumbnail_link
  - version
  - viewed_by_me
  - viewed_by_me_time
  - web_view_link

tables:
  googlesheets_spreadsheet:
    label: Spreadsheets
    description: Metadata, sharing, owners, capabilities, and links for the configured Google spreadsheet.
    grain: One row per configured spreadsheet.
    type: dimension
    primary_time_column: modified_time
    notes: Each Settra Google Sheets connection maps to one spreadsheet_id. Use this table for spreadsheet-level metadata, sharing, owner, permission, and link questions, not tabular row data.
    metrics:
      spreadsheets:
        sql: count(*)
        description: Number of configured spreadsheets visible to this connection.
      shared_spreadsheets:
        sql: count(*) filter (where shared = true)
        description: Number of configured spreadsheets marked as shared.
      starred_spreadsheets:
        sql: count(*) filter (where starred = true)
        description: Number of configured spreadsheets marked as starred.
    dimensions:
      spreadsheet_name:
        column: name
        description: Display name of the spreadsheet.
      modified_day:
        sql: date_trunc('day', modified_time)
        description: Day the spreadsheet was last modified.
    caveats:
      - This table does not contain rows from individual sheet tabs.
      - JSON fields such as owners, permissions, last_modifying_user, and capabilities may need JSON operators for detailed filtering.
    columns:
      id:
        label: Spreadsheet ID
        type: primary_key
        description: Google Drive file ID for the spreadsheet.
      name:
        description: Spreadsheet display name.
      created_time:
        description: Time when the spreadsheet file was created.
      modified_time:
        label: Modified Time
        type: date
        grain: day
        description: Time when the spreadsheet file was last modified.
      owned_by_me:
        description: Whether the authenticated principal owns the spreadsheet.
      shared:
        description: Whether the spreadsheet is shared.
      capabilities:
        description: JSON capabilities available to the authenticated principal.
      permissions:
        description: JSON permission records for the spreadsheet.
      owners:
        description: JSON owner records for the spreadsheet.
      last_modifying_user:
        description: JSON user record for the last modifying user.
      spreadsheet_id:
        description: Configured spreadsheet ID for this connection.

  googlesheets_sheet:
    label: Sheets
    description: Metadata for sheets or tabs inside the configured Google spreadsheet.
    grain: One row per sheet/tab in the configured spreadsheet.
    type: dimension
    notes: Use this table to discover sheet/tab titles before querying dynamic sheet tables or filtering googlesheets_cell. Sheet titles may become table names and often require double quotes in SQL.
    metrics:
      sheets:
        sql: count(*)
        description: Number of sheets/tabs in the spreadsheet.
      hidden_sheets:
        sql: count(*) filter (where hidden = true)
        description: Number of hidden sheets/tabs.
    dimensions:
      sheet_title:
        column: title
        description: Human-readable sheet/tab name.
      sheet_type:
        column: sheet_type
        description: Type of sheet/tab.
      visibility:
        sql: case when hidden then 'hidden' else 'visible' end
        description: Sheet/tab visibility.
    caveats:
      - Actual tabular row data is exposed through dynamic tables named after configured sheets or through googlesheets_cell.
      - Quote dynamic table names when they contain spaces, punctuation, or mixed case, for example schema."Sales Pipeline".
      - Use the title column as the exact sheet_name value and casing for googlesheets_cell filters.
      - Dynamic sheet tables use row 1 as column headers. If row 1 contains actual data, the dynamic table can expose value-like column names and return zero rows; use googlesheets_cell instead.
    columns:
      title:
        label: Sheet Title
        type: dimension
        description: Sheet/tab title. This can become the dynamic table name.
      sheet_id:
        label: Sheet ID
        type: primary_key
        description: Numeric sheet/tab ID.
      sheet_type:
        description: Type of sheet/tab, such as grid.
      hidden:
        description: Whether the sheet/tab is hidden.
      index:
        description: Display order of the sheet/tab within the spreadsheet.
      right_to_left:
        description: Whether the sheet/tab uses right-to-left layout.
      grid_properties:
        description: JSON grid metadata such as row and column counts.
      protected_ranges:
        description: JSON protected ranges configured on the sheet/tab.
      charts:
        description: JSON chart metadata configured on the sheet/tab.
      spreadsheet_id:
        description: Configured spreadsheet ID for this connection.

  googlesheets_cell:
    label: Cells
    description: Cell-level values, formulas, notes, hyperlinks, and coordinates for sheets in the configured Google spreadsheet.
    grain: One row per populated cell, identified by sheet_name and cell address.
    type: fact
    notes: Use this table for raw cell inspection, formula or note audits, or when dynamic worksheet columns are unknown or unsuitable for analytics. This table is one row per populated cell, not one row per worksheet record.
    metrics:
      cells:
        sql: count(*)
        description: Number of populated cells returned by the query.
      formula_cells:
        sql: count(*) filter (where formula is not null and formula <> '')
        description: Number of cells containing formulas.
      hyperlink_cells:
        sql: count(*) filter (where hyperlink is not null and hyperlink <> '')
        description: Number of cells containing hyperlinks.
    dimensions:
      sheet_name:
        column: sheet_name
        description: Sheet/tab name for the cell.
      column_letter:
        column: col
        description: Spreadsheet column letter.
      row_number:
        column: row
        description: Spreadsheet row number.
    caveats:
      - Prefer dynamic sheet tables for normal tabular analytics when the header row is clean and columns are known.
      - Do not use count(*) on this table as a customer/order/record count unless records have first been reconstructed by grouping cells into rows.
      - Use this raw cell table when a dynamic sheet table has value-like column names or returns zero rows because the first data row was promoted into headers.
      - Filter by exact sheet_name casing from googlesheets_sheet.title, range, row, col, or cell when possible to avoid reading the entire spreadsheet.
      - The value column is formatted text; cast numeric or date values explicitly before aggregation.
    columns:
      sheet_name:
        label: Sheet Name
        type: dimension
        description: Sheet/tab name containing the cell.
      col:
        description: Spreadsheet column letter for the cell.
      row:
        label: Row Number
        type: dimension
        description: Spreadsheet row number for the cell.
      cell:
        label: Cell
        type: primary_key
        description: A1-style cell address.
      value:
        label: Value
        type: dimension
        description: Formatted cell value as text.
      formula:
        description: Cell formula when present.
      note:
        description: Cell note when present.
      hyperlink:
        description: Cell hyperlink when present.
      range:
        description: Queried A1 range for the cell.
      spreadsheet_id:
        description: Configured spreadsheet ID for this connection.
