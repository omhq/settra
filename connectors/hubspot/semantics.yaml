  dimensions:
  - name: domain
    title: Domain
    sql: domain
    type: string
    description: Domain name.
  - name: created_month
    title: Created Month
    sql: date_trunc('month', created)
    type: time
    description: Calendar month of domain creation.
  - name: apex_domain
    title: Apex Domain
    sql: apex_domain
    type: string
    description: Apex domain.
  - name: public_suffix
    title: Public Suffix
    sql: public_suffix
    type: string
    description: Public suffix.
  - name: id
    title: Domain ID
    sql: id
    type: string
    description: Unique HubSpot domain ID.
    primary_key: true
  - name: portal_id
    title: Portal Id
    sql: portal_id
    type: string
    description: HubSpot portal or account ID.
  - name: is_resolving
    title: Resolving
    sql: is_resolving
    type: string
    description: Whether the domain resolves.
  - name: is_dns_correct
    title: DNS Correct
    sql: is_dns_correct
    type: string
    description: Whether DNS is configured correctly.
  - name: is_ssl_enabled
    title: SSL Enabled
    sql: is_ssl_enabled
    type: string
    description: Whether SSL is enabled.
  - name: is_any_primary
    title: Any Primary
    sql: is_any_primary
    type: string
    description: Whether the domain is primary for any content type.
  - name: created
    title: Created Date
    sql: created
    type: time
    description: Domain creation timestamp.
  - name: updated
    title: Updated
    sql: updated
    type: time
    description: Domain last update timestamp.
  segments:
  - name: resolving_only
    title: Resolving only
    sql: is_resolving = true
  - name: ssl_enabled
    title: SSL enabled
    sql: is_ssl_enabled = true
  - name: primary_only
    title: Primary only
    sql: is_any_primary = true
- name: hubspot_hub_db
  sql_table: '"hubspot"."hubspot_hub_db"'
  title: HubDB Tables
  description: 'Published HubDB table metadata, including table names, columns, row counts, publication status, and dynamic-page flags.


    id (one row per HubDB table)


    Use this table for HubDB inventory and metadata. It does not expose every row from each HubDB table.


    Caveats: columns, created_by, updated_by, and dynamic_meta_tags are JSON fields. row_count is metadata and can differ from row-level query results if the source changes during a query.'
  measures:
  - name: hubdb_tables
    title: Hubdb Tables
    description: Count of HubDB tables.
    type: count
  - name: published_tables
    title: Published Tables
    description: Count of published HubDB tables.
    type: count
    filters:
    - sql: published = true
  - name: archived_tables
    title: Archived Tables
    description: Count of archived HubDB tables.
    type: count
    filters:
    - sql: archived = true
  - name: total_rows
    title: Total Rows
    description: Total HubDB rows across tables.
    type: sum
    sql: row_count
  dimensions:
  - name: table_name
    title: Table Name
    sql: name
    type: string
    description: HubDB table name.
  - name: published
    title: Published
    sql: published
    type: string
    description: Published status.
  - name: created_month
    title: Created Month
