cubes:
- name: hubspot_contact
  sql_table: '"hubspot"."hubspot_contact"'
  title: Contacts
  description: 'HubSpot CRM contact records, including contact properties such as email, name, lifecycle stage, location, job title, and owner when those properties are available.


    id (one row per contact)


    Many business fields are dynamic HubSpot properties. Confirm property availability in the live schema before relying on custom fields or portal-specific property names.


    Caveats: The plugin creates dynamic columns from HubSpot contact properties; custom property names vary by portal. Owner joins require the hubspot_owner_id contact property to exist in the portal schema. recent_deal_close_date can be null for contacts without closed deals.'
  measures:
  - name: contacts
    title: Contacts
    description: Count of contacts.
    type: count
  - name: active_contacts
    title: Active Contacts
    description: Count of non-archived contacts.
    type: count
    filters:
    - sql: archived = false
  - name: archived_contacts
    title: Archived Contacts
    description: Count of archived contacts.
    type: count
    filters:
    - sql: archived = true
  - name: lead_contacts
    title: Lead Contacts
    description: Count of contacts whose lifecycle stage is lead.
    type: count
    filters:
    - sql: lifecyclestage = 'lead'
  dimensions:
  - name: contact_created_month
    title: Contact Created Month
    sql: date_trunc('month', created_at)
    type: time
    description: Calendar month of contact creation.
  - name: lifecycle_stage
    title: Lifecycle Stage
    sql: lifecyclestage
    type: string
    description: HubSpot lifecycle stage for the contact.
  - name: contact_state
    title: Contact State
    sql: state
    type: string
    description: State or region recorded on the contact.
  - name: job_title
    title: Job Title
    sql: jobtitle
    type: string
    description: Contact job title.
  - name: id
    title: Contact ID
    sql: id
    type: string
    description: Unique HubSpot contact ID.
    primary_key: true
  - name: portal_id
    title: Portal Id
    sql: portal_id
    type: string
    description: HubSpot portal or account ID.
  - name: email
    title: Email
    sql: email
    type: string
    description: Contact email address.
  - name: firstname
    title: First Name
    sql: firstname
    type: string
    description: Contact first name.
  - name: lastname
    title: Last Name
    sql: lastname
    type: string
    description: Contact last name.
  - name: lifecyclestage
    title: Lifecycle Stage
    sql: lifecyclestage
    type: string
    description: Contact lifecycle stage such as lead, subscriber, opportunity, or customer.
  - name: jobtitle
    title: Job Title
    sql: jobtitle
    type: string
    description: Contact job title.
  - name: state
    title: State
    sql: state
    type: string
    description: Contact state or region.
  - name: hubspot_owner_id
    title: Owner
    sql: hubspot_owner_id
    type: string
    description: HubSpot owner assigned to the contact, when present.
    meta:
      references: hubspot_owner.id
  - name: recent_deal_close_date
    title: Recent Deal Close Date
    sql: recent_deal_close_date
    type: time
    description: Most recent associated deal close date, when present.
  - name: created_at
    title: Created Date
    sql: created_at
    type: time
    description: Contact creation timestamp.
  - name: updated_at
    title: Updated At
    sql: updated_at
    type: time
    description: Contact last update timestamp.
  - name: archived
    title: Archived
    sql: archived
    type: string
    description: Whether the contact is archived.
  joins:
  - name: hubspot_owner
    sql: '{CUBE}.hubspot_owner_id = {hubspot_owner}.id'
    relationship: many_to_one
  segments:
  - name: active_only
    title: Active only
    sql: archived = false
  - name: last_30_days
    title: Last 30 days
    sql: created_at >= now() - interval '30 days'
  - name: leads_only
    title: Leads only
    sql: lifecyclestage = 'lead'
- name: hubspot_company
  sql_table: '"hubspot"."hubspot_company"'
  title: Companies
  description: 'HubSpot CRM company records with firmographic properties such as domain, industry, size, location, public/private status, and owner when available.


    id (one row per company)


    Company properties are dynamic. Use this table for account segmentation, target-account lists, and company metadata, not contact-level activity.


    Caveats: numberofemployees may be delivered as a dynamic property; confirm type before numeric comparison. Owner joins require the hubspot_owner_id company property to exist in the portal schema.'
  measures:
  - name: companies
    title: Companies
    description: Count of companies.
    type: count
  - name: active_companies
    title: Active Companies
    description: Count of non-archived companies.
    type: count
    filters:
    - sql: archived = false
  - name: archived_companies
    title: Archived Companies
    description: Count of archived companies.
    type: count
    filters:
    - sql: archived = true
  - name: public_companies
    title: Public Companies
    description: Count of companies marked public.
    type: count
    filters:
    - sql: is_public = true
  dimensions:
  - name: company_created_month
    title: Company Created Month
    sql: date_trunc('month', created_at)
    type: time
    description: Calendar month of company creation.
  - name: company_domain
    title: Company Domain
    sql: domain
    type: string
    description: Company web domain.
  - name: industry
    title: Industry
    sql: industry
    type: string
    description: Company industry.
  - name: company_type
    title: Company Type
    sql: type
    type: string
    description: Company relationship type.
  - name: company_state
    title: Company State
    sql: state
    type: string
    description: Company state or region.
  - name: id
    title: Company ID
    sql: id
    type: string
    description: Unique HubSpot company ID.
    primary_key: true
  - name: portal_id
    title: Portal Id
    sql: portal_id
    type: string
    description: HubSpot portal or account ID.
  - name: domain
    title: Domain
    sql: domain
    type: string
    description: Company domain.
  - name: name
    title: Company Name
    sql: name
    type: string
    description: Company display name, when present.
  - name: type
    title: Type
    sql: type
    type: string
    description: Company relationship type, such as vendor or prospect.
  - name: numberofemployees
    title: Employees
    sql: numberofemployees
    type: string
    description: Number of employees property, when present.
  - name: is_public
    title: Public
    sql: is_public
    type: string
    description: Whether the company is marked publicly traded.
  - name: hubspot_owner_id
    title: Owner
    sql: hubspot_owner_id
    type: string
    description: HubSpot owner assigned to the company, when present.
    meta:
      references: hubspot_owner.id
  - name: created_at
    title: Created Date
    sql: created_at
    type: time
    description: Company creation timestamp.
  - name: updated_at
    title: Updated At
    sql: updated_at
    type: time
    description: Company last update timestamp.
  - name: archived
    title: Archived
    sql: archived
    type: string
    description: Whether the company is archived.
  joins:
  - name: hubspot_owner
    sql: '{CUBE}.hubspot_owner_id = {hubspot_owner}.id'
    relationship: many_to_one
  segments:
  - name: active_only
    title: Active only
    sql: archived = false
  - name: public_companies_segment
    title: Public companies
    sql: is_public = true
  - name: last_30_days
    title: Last 30 days
    sql: created_at >= now() - interval '30 days'
- name: hubspot_deal
  sql_table: '"hubspot"."hubspot_deal"'
  title: Deals
  description: 'HubSpot sales deals, including deal amount, pipeline, stage, close date, deal type, and archived status.


    id (one row per deal)


    Use this as the primary table for pipeline, opportunity, and deal-value analysis. amount is stored as a major currency numeric property when HubSpot exposes it as a number.


    Caveats: Deal stages and pipelines are portal-specific; do not assume default stage names unless observed in the live schema or data. closedate may represent an expected close date as well as a completed deal date depending on pipeline usage. Owner joins require the hubspot_owner_id deal property to exist in the portal schema.'
  measures:
  - name: deals
    title: Deals
    description: Count of deals.
    type: count
  - name: active_deals
    title: Active Deals
    description: Count of non-archived deals.
    type: count
    filters:
    - sql: archived = false
  - name: archived_deals
    title: Archived Deals
    description: Count of archived deals.
    type: count
    filters:
    - sql: archived = true
  - name: total_deal_amount
    title: Total Deal Amount
    description: Sum of deal amount.
    type: sum
    sql: amount
    format: currency
  - name: average_deal_amount
    title: Average Deal Amount
    description: Average deal amount.
    type: avg
    sql: amount
    format: currency
  - name: new_business_deals
    title: New Business Deals
    description: Count of deals marked new business.
    type: count
    filters:
    - sql: dealtype = 'newbusiness'
  dimensions:
  - name: deal_created_month
    title: Deal Created Month
    sql: date_trunc('month', created_at)
    type: time
    description: Calendar month of deal creation.
  - name: close_month
    title: Close Month
    sql: date_trunc('month', closedate)
    type: time
    description: Calendar month of expected or actual close date.
  - name: pipeline
    title: Pipeline
    sql: pipeline
    type: string
    description: HubSpot pipeline.
  - name: deal_stage
    title: Deal Stage
    sql: dealstage
    type: string
    description: HubSpot deal stage.
  - name: deal_type
    title: Deal Type
    sql: dealtype
    type: string
    description: HubSpot deal type.
  - name: id
    title: Deal ID
    sql: id
    type: string
    description: Unique HubSpot deal ID.
    primary_key: true
  - name: portal_id
    title: Portal Id
    sql: portal_id
    type: string
    description: HubSpot portal or account ID.
  - name: amount
    title: Amount
    sql: amount
    type: number
    description: Deal amount.
    format: currency
  - name: dealname
    title: Deal Name
    sql: dealname
    type: string
    description: Deal display name.
  - name: dealstage
    title: Deal Stage
    sql: dealstage
    type: string
    description: Deal stage within the pipeline.
  - name: dealtype
    title: Deal Type
    sql: dealtype
    type: string
    description: Deal type such as newbusiness.
  - name: closedate
    title: Close Date
    sql: closedate
    type: time
    description: 'The authoritative date a deal was won or lost. ALWAYS use this for conversion questions.

      '
  - name: hubspot_owner_id
    title: Owner
    sql: hubspot_owner_id
    type: string
    description: HubSpot owner assigned to the deal, when present.
    meta:
      references: hubspot_owner.id
  - name: created_at
    title: Created Date
    sql: created_at
    type: time
    description: Deal creation timestamp.
  - name: updated_at
    title: Updated At
    sql: updated_at
    type: time
    description: Deal last update timestamp.
  - name: archived
    title: Archived
    sql: archived
    type: string
    description: Whether the deal is archived.
  joins:
  - name: hubspot_owner
    sql: '{CUBE}.hubspot_owner_id = {hubspot_owner}.id'
    relationship: many_to_one
  segments:
  - name: active_only
    title: Active only
    sql: archived = false
  - name: new_business
    title: New business
    sql: dealtype = 'newbusiness'
  - name: last_30_days
    title: Last 30 days
    sql: created_at >= now() - interval '30 days'
- name: hubspot_ticket
  sql_table: '"hubspot"."hubspot_ticket"'
  title: Tickets
  description: 'HubSpot Service Hub support tickets, including pipeline, stage, priority, source type, creation time, and time-to-close properties.


    id (one row per ticket)


    Use this table for support volume, priority mix, and open ticket questions.


    Caveats: Pipeline stages and priority values are portal-specific beyond common defaults. time_to_close being null is a practical open-ticket signal, but confirm this matches the portal workflow. Owner joins require the hubspot_owner_id ticket property to exist in the portal schema.'
  measures:
  - name: tickets
    title: Tickets
    description: Count of tickets.
    type: count
  - name: active_tickets
    title: Active Tickets
    description: Count of non-archived tickets.
    type: count
    filters:
    - sql: archived = false
  - name: open_tickets
    title: Open Tickets
    description: Count of tickets without a time_to_close value.
    type: count
    filters:
    - sql: time_to_close is null
  - name: high_priority_tickets
    title: High Priority Tickets
    description: Count of high-priority tickets.
    type: count
    filters:
    - sql: hs_ticket_priority = 'HIGH'
  dimensions:
  - name: ticket_created_month
    title: Ticket Created Month
    sql: date_trunc('month', created_at)
    type: time
    description: Calendar month of ticket creation.
  - name: pipeline
    title: Pipeline
    sql: hs_pipeline
    type: string
    description: Ticket pipeline.
  - name: pipeline_stage
    title: Pipeline Stage
    sql: hs_pipeline_stage
    type: string
    description: Ticket pipeline stage.
  - name: priority
    title: Priority
    sql: hs_ticket_priority
    type: string
    description: Ticket priority.
  - name: source_type
    title: Source Type
    sql: source_type
    type: string
    description: Ticket source type.
  - name: id
    title: Ticket ID
    sql: id
    type: string
    description: Unique HubSpot ticket ID.
    primary_key: true
  - name: portal_id
    title: Portal Id
    sql: portal_id
    type: string
    description: HubSpot portal or account ID.
  - name: content
    title: Content
    sql: content
    type: string
    description: Ticket content or summary.
  - name: hs_pipeline
    title: Pipeline
    sql: hs_pipeline
    type: string
    description: Ticket pipeline.
  - name: hs_pipeline_stage
    title: Pipeline Stage
    sql: hs_pipeline_stage
    type: string
    description: Ticket pipeline stage.
  - name: hs_ticket_priority
    title: Priority
    sql: hs_ticket_priority
    type: string
    description: Ticket priority.
  - name: time_to_close
    title: Time To Close
    sql: time_to_close
    type: string
    description: HubSpot time-to-close property, null for open tickets in common workflows.
  - name: hubspot_owner_id
    title: Owner
    sql: hubspot_owner_id
    type: string
    description: HubSpot owner assigned to the ticket, when present.
    meta:
      references: hubspot_owner.id
  - name: created_at
    title: Created Date
    sql: created_at
    type: time
    description: Ticket creation timestamp.
  - name: updated_at
    title: Updated At
    sql: updated_at
    type: time
    description: Ticket last update timestamp.
  - name: archived
    title: Archived
    sql: archived
    type: string
    description: Whether the ticket is archived.
  joins:
  - name: hubspot_owner
    sql: '{CUBE}.hubspot_owner_id = {hubspot_owner}.id'
    relationship: many_to_one
  segments:
  - name: active_only
    title: Active only
    sql: archived = false
  - name: open_tickets_segment
    title: Open tickets
    sql: time_to_close is null
  - name: high_priority
    title: High priority
    sql: hs_ticket_priority = 'HIGH'
  - name: last_30_days
    title: Last 30 days
    sql: created_at >= now() - interval '30 days'
- name: hubspot_owner
  sql_table: '"hubspot"."hubspot_owner"'
  title: Owners
  description: 'HubSpot owners and users who can be assigned to CRM records.


    id (one row per owner)


    Use this table to label assigned owners in contacts, companies, deals, and tickets when those tables expose hubspot_owner_id.


    Caveats: teams is a JSON field and may need JSON operators for team-level analysis.'
  measures:
  - name: owners
    title: Owners
    description: Count of owners.
    type: count
  - name: active_owners
    title: Active Owners
    description: Count of non-archived owners.
    type: count
    filters:
    - sql: archived = false
  - name: archived_owners
    title: Archived Owners
    description: Count of archived owners.
    type: count
    filters:
    - sql: archived = true
  dimensions:
  - name: owner_email
    title: Owner Email
    sql: email
    type: string
    description: Owner email address.
  - name: owner_created_month
    title: Owner Created Month
    sql: date_trunc('month', created_at)
    type: time
    description: Calendar month of owner creation.
  - name: id
    title: Owner ID
    sql: id
    type: string
    description: Unique HubSpot owner ID.
    primary_key: true
  - name: portal_id
    title: Portal Id
    sql: portal_id
    type: string
    description: HubSpot portal or account ID.
  - name: email
    title: Email
    sql: email
    type: string
    description: Owner email address.
  - name: first_name
    title: First Name
    sql: first_name
    type: string
    description: Owner first name.
  - name: last_name
    title: Last Name
    sql: last_name
    type: string
    description: Owner last name.
  - name: user_id
    title: User Id
    sql: user_id
    type: string
    description: HubSpot user ID associated with the owner.
  - name: teams
    title: Teams
    sql: teams
    type: string
    description: JSON teams associated with the owner.
  - name: created_at
    title: Created Date
    sql: created_at
    type: time
    description: Owner creation timestamp.
  - name: updated_at
    title: Updated At
    sql: updated_at
    type: time
    description: Owner last update timestamp.
  - name: archived
    title: Archived
    sql: archived
    type: string
    description: Whether the owner is archived.
  segments:
  - name: active_only
    title: Active only
    sql: archived = false
- name: hubspot_blog_post
  sql_table: '"hubspot"."hubspot_blog_post"'
  title: Blog Posts
  description: 'HubSpot CMS blog posts, including publish state, language, author, campaign, domain, URL, and publication timestamps.


    id (one row per blog post)


    Use this table for content inventory, publication status, localization, authoring, and URL questions.


    Caveats: post_body and HTML fields can be large; avoid selecting them unless needed. URL and domain behavior depends on CMS domain configuration.'
  measures:
  - name: blog_posts
    title: Blog Posts
    description: Count of blog posts.
    type: count
  - name: published_blog_posts
    title: Published Blog Posts
    description: Count of currently published blog posts.
    type: count
    filters:
    - sql: currently_published = true
  - name: archived_blog_posts
    title: Archived Blog Posts
    description: Count of archived blog posts.
    type: count
    filters:
    - sql: archived = true
  dimensions:
  - name: created_month
    title: Created Month
    sql: date_trunc('month', created)
    type: time
    description: Calendar month of blog post creation.
  - name: publish_month
    title: Publish Month
    sql: date_trunc('month', publish_date)
    type: time
    description: Calendar month of scheduled or actual publication.
  - name: post_state
    title: Post State
    sql: state
    type: string
    description: Blog post state.
  - name: language
    title: Language
    sql: language
    type: string
    description: Blog post language code.
  - name: author_name
    title: Author Name
    sql: author_name
    type: string
    description: Blog post author name.
  - name: domain
    title: Domain
    sql: domain
    type: string
    description: Domain where the post resolves.
  - name: id
    title: Blog Post ID
    sql: id
    type: string
    description: Unique HubSpot blog post ID.
    primary_key: true
  - name: portal_id
    title: Portal Id
    sql: portal_id
    type: string
    description: HubSpot portal or account ID.
  - name: name
    title: Name
    sql: name
    type: string
    description: Internal blog post name.
  - name: html_title
    title: HTML Title
    sql: html_title
    type: string
    description: HTML title of the blog post.
  - name: slug
    title: Slug
    sql: slug
    type: string
    description: Path slug appended to the domain.
  - name: url
    title: URL
    sql: url
    type: string
    description: Generated blog post URL.
  - name: state
    title: State
    sql: state
    type: string
    description: Blog post state.
  - name: currently_published
    title: Currently Published
    sql: currently_published
    type: string
    description: Whether the blog post is currently published.
  - name: created
    title: Created Date
    sql: created
    type: time
    description: Blog post creation timestamp.
  - name: updated
    title: Updated
    sql: updated
    type: time
    description: Blog post last update timestamp.
  - name: publish_date
    title: Publish Date
    sql: publish_date
    type: time
    description: Blog post publish date.
  - name: archived
    title: Archived
    sql: archived
    type: string
    description: Whether the blog post is archived.
  segments:
  - name: published_only
    title: Published only
    sql: currently_published = true
  - name: active_only
    title: Active only
    sql: archived = false
