plugin: hubspot
version: 1
generated_by: ai
validated: false
ignored_column_postfixes:
  - _ctx
  - sp_ctx

tables:
  hubspot_contact:
    label: Contacts
    description: HubSpot CRM contact records, including contact properties such as email, name, lifecycle stage, location, job title, and owner when those properties are available.
    grain: id (one row per contact)
    type: dimension
    primary_time_column: created_at
    notes: Many business fields are dynamic HubSpot properties. Confirm property availability in the live schema before relying on custom fields or portal-specific property names.
    metrics:
      contacts:
        sql: "count(*)"
        description: Count of contacts.
      active_contacts:
        sql: "count(*) filter (where archived = false)"
        description: Count of non-archived contacts.
      archived_contacts:
        sql: "count(*) filter (where archived = true)"
        description: Count of archived contacts.
      lead_contacts:
        sql: "count(*) filter (where lifecyclestage = 'lead')"
        description: Count of contacts whose lifecycle stage is lead.
    dimensions:
      contact_created_month:
        sql: "date_trunc('month', created_at)"
        description: Calendar month of contact creation.
      lifecycle_stage:
        column: lifecyclestage
        description: HubSpot lifecycle stage for the contact.
      contact_state:
        column: state
        description: State or region recorded on the contact.
      job_title:
        column: jobtitle
        description: Contact job title.
    common_filters:
      - label: Active only
        sql: archived = false
      - label: Last 30 days
        sql: created_at >= now() - interval '30 days'
      - label: Leads only
        sql: lifecyclestage = 'lead'
    common_joins:
      - hubspot_owner on hubspot_contact.hubspot_owner_id = hubspot_owner.id
    caveats:
      - The plugin creates dynamic columns from HubSpot contact properties; custom property names vary by portal.
      - Owner joins require the hubspot_owner_id contact property to exist in the portal schema.
      - recent_deal_close_date can be null for contacts without closed deals.
    columns:
      id:
        label: Contact ID
        type: primary_key
        description: Unique HubSpot contact ID.
      portal_id:
        description: HubSpot portal or account ID.
      email:
        label: Email
        type: dimension
        description: Contact email address.
      firstname:
        label: First Name
        description: Contact first name.
      lastname:
        label: Last Name
        description: Contact last name.
      lifecyclestage:
        label: Lifecycle Stage
        type: dimension
        description: Contact lifecycle stage such as lead, subscriber, opportunity, or customer.
      jobtitle:
        label: Job Title
        type: dimension
        description: Contact job title.
      state:
        label: State
        type: dimension
        description: Contact state or region.
      hubspot_owner_id:
        label: Owner
        type: foreign_key
        references: hubspot_owner.id
        description: HubSpot owner assigned to the contact, when present.
      recent_deal_close_date:
        label: Recent Deal Close Date
        type: date
        description: Most recent associated deal close date, when present.
      created_at:
        label: Created Date
        type: date
        grain: day
        description: Contact creation timestamp.
      updated_at:
        description: Contact last update timestamp.
      archived:
        label: Archived
        type: dimension
        description: Whether the contact is archived.

  hubspot_company:
    label: Companies
    description: HubSpot CRM company records with firmographic properties such as domain, industry, size, location, public/private status, and owner when available.
    grain: id (one row per company)
    type: dimension
    primary_time_column: created_at
    notes: Company properties are dynamic. Use this table for account segmentation, target-account lists, and company metadata, not contact-level activity.
    metrics:
      companies:
        sql: "count(*)"
        description: Count of companies.
      active_companies:
        sql: "count(*) filter (where archived = false)"
        description: Count of non-archived companies.
      archived_companies:
        sql: "count(*) filter (where archived = true)"
        description: Count of archived companies.
      public_companies:
        sql: "count(*) filter (where is_public = true)"
        description: Count of companies marked public.
    dimensions:
      company_created_month:
        sql: "date_trunc('month', created_at)"
        description: Calendar month of company creation.
      company_domain:
        column: domain
        description: Company web domain.
      industry:
        column: industry
        description: Company industry.
      company_type:
        column: type
        description: Company relationship type.
      company_state:
        column: state
        description: Company state or region.
    common_filters:
      - label: Active only
        sql: archived = false
      - label: Public companies
        sql: is_public = true
      - label: Last 30 days
        sql: created_at >= now() - interval '30 days'
    common_joins:
      - hubspot_owner on hubspot_company.hubspot_owner_id = hubspot_owner.id
    caveats:
      - numberofemployees may be delivered as a dynamic property; confirm type before numeric comparison.
      - Owner joins require the hubspot_owner_id company property to exist in the portal schema.
    columns:
      id:
        label: Company ID
        type: primary_key
        description: Unique HubSpot company ID.
      portal_id:
        description: HubSpot portal or account ID.
      domain:
        label: Domain
        type: dimension
        description: Company domain.
      name:
        label: Company Name
        description: Company display name, when present.
      industry:
        type: dimension
        description: Company industry.
      type:
        type: dimension
        description: Company relationship type, such as vendor or prospect.
      numberofemployees:
        label: Employees
        description: Number of employees property, when present.
      is_public:
        label: Public
        type: dimension
        description: Whether the company is marked publicly traded.
      hubspot_owner_id:
        label: Owner
        type: foreign_key
        references: hubspot_owner.id
        description: HubSpot owner assigned to the company, when present.
      created_at:
        label: Created Date
        type: date
        grain: day
        description: Company creation timestamp.
      updated_at:
        description: Company last update timestamp.
      archived:
        label: Archived
        type: dimension
        description: Whether the company is archived.

  hubspot_deal:
    label: Deals
    description: HubSpot sales deals, including deal amount, pipeline, stage, close date, deal type, and archived status.
    grain: id (one row per deal)
    type: fact
    primary_time_column: created_at
    notes: Use this as the primary table for pipeline, opportunity, and deal-value analysis. amount is stored as a major currency numeric property when HubSpot exposes it as a number.
    metrics:
      deals:
        sql: "count(*)"
        description: Count of deals.
      active_deals:
        sql: "count(*) filter (where archived = false)"
        description: Count of non-archived deals.
      archived_deals:
        sql: "count(*) filter (where archived = true)"
        description: Count of archived deals.
      total_deal_amount:
        sql: "sum(amount)"
        unit: currency
        description: Sum of deal amount.
      average_deal_amount:
        sql: "avg(amount)"
        unit: currency
        description: Average deal amount.
      new_business_deals:
        sql: "count(*) filter (where dealtype = 'newbusiness')"
        description: Count of deals marked new business.
    dimensions:
      deal_created_month:
        sql: "date_trunc('month', created_at)"
        description: Calendar month of deal creation.
      close_month:
        sql: "date_trunc('month', closedate)"
        description: Calendar month of expected or actual close date.
      pipeline:
        column: pipeline
        description: HubSpot pipeline.
      deal_stage:
        column: dealstage
        description: HubSpot deal stage.
      deal_type:
        column: dealtype
        description: HubSpot deal type.
    common_filters:
      - label: Active only
        sql: archived = false
      - label: New business
        sql: dealtype = 'newbusiness'
      - label: Last 30 days
        sql: created_at >= now() - interval '30 days'
    common_joins:
      - hubspot_owner on hubspot_deal.hubspot_owner_id = hubspot_owner.id
    caveats:
      - Deal stages and pipelines are portal-specific; do not assume default stage names unless observed in the live schema or data.
      - closedate may represent an expected close date as well as a completed deal date depending on pipeline usage.
      - Owner joins require the hubspot_owner_id deal property to exist in the portal schema.
    columns:
      id:
        label: Deal ID
        type: primary_key
        description: Unique HubSpot deal ID.
      portal_id:
        description: HubSpot portal or account ID.
      amount:
        label: Amount
        type: metric
        unit: currency
        description: Deal amount.
      dealname:
        label: Deal Name
        description: Deal display name.
      pipeline:
        label: Pipeline
        type: dimension
        description: Deal pipeline.
      dealstage:
        label: Deal Stage
        type: dimension
        description: Deal stage within the pipeline.
      dealtype:
        label: Deal Type
        type: dimension
        description: Deal type such as newbusiness.
      closedate:
        label: Close Date
        type: date
        grain: day
        description: >
          The authoritative date a deal was won or lost.
          ALWAYS use this for conversion questions.
      hubspot_owner_id:
        label: Owner
        type: foreign_key
        references: hubspot_owner.id
        description: HubSpot owner assigned to the deal, when present.
      created_at:
        label: Created Date
        type: date
        grain: day
        description: Deal creation timestamp.
      updated_at:
        description: Deal last update timestamp.
      archived:
        label: Archived
        type: dimension
        description: Whether the deal is archived.

  hubspot_ticket:
    label: Tickets
    description: HubSpot Service Hub support tickets, including pipeline, stage, priority, source type, creation time, and time-to-close properties.
    grain: id (one row per ticket)
    type: fact
    primary_time_column: created_at
    notes: Use this table for support volume, priority mix, and open ticket questions.
    metrics:
      tickets:
        sql: "count(*)"
        description: Count of tickets.
      active_tickets:
        sql: "count(*) filter (where archived = false)"
        description: Count of non-archived tickets.
      open_tickets:
        sql: "count(*) filter (where time_to_close is null)"
        description: Count of tickets without a time_to_close value.
      high_priority_tickets:
        sql: "count(*) filter (where hs_ticket_priority = 'HIGH')"
        description: Count of high-priority tickets.
    dimensions:
      ticket_created_month:
        sql: "date_trunc('month', created_at)"
        description: Calendar month of ticket creation.
      pipeline:
        column: hs_pipeline
        description: Ticket pipeline.
      pipeline_stage:
        column: hs_pipeline_stage
        description: Ticket pipeline stage.
      priority:
        column: hs_ticket_priority
        description: Ticket priority.
      source_type:
        column: source_type
        description: Ticket source type.
    common_filters:
      - label: Active only
        sql: archived = false
      - label: Open tickets
        sql: time_to_close is null
      - label: High priority
        sql: hs_ticket_priority = 'HIGH'
      - label: Last 30 days
        sql: created_at >= now() - interval '30 days'
    common_joins:
      - hubspot_owner on hubspot_ticket.hubspot_owner_id = hubspot_owner.id
    caveats:
      - Pipeline stages and priority values are portal-specific beyond common defaults.
      - time_to_close being null is a practical open-ticket signal, but confirm this matches the portal workflow.
      - Owner joins require the hubspot_owner_id ticket property to exist in the portal schema.
    columns:
      id:
        label: Ticket ID
        type: primary_key
        description: Unique HubSpot ticket ID.
      portal_id:
        description: HubSpot portal or account ID.
      content:
        label: Content
        description: Ticket content or summary.
      hs_pipeline:
        label: Pipeline
        type: dimension
        description: Ticket pipeline.
      hs_pipeline_stage:
        label: Pipeline Stage
        type: dimension
        description: Ticket pipeline stage.
      hs_ticket_priority:
        label: Priority
        type: dimension
        values: [LOW, MEDIUM, HIGH]
        description: Ticket priority.
      source_type:
        label: Source Type
        type: dimension
        description: Channel or source that submitted the ticket.
      time_to_close:
        label: Time To Close
        description: HubSpot time-to-close property, null for open tickets in common workflows.
      hubspot_owner_id:
        label: Owner
        type: foreign_key
        references: hubspot_owner.id
        description: HubSpot owner assigned to the ticket, when present.
      created_at:
        label: Created Date
        type: date
        grain: day
        description: Ticket creation timestamp.
      updated_at:
        description: Ticket last update timestamp.
      archived:
        label: Archived
        type: dimension
        description: Whether the ticket is archived.

  hubspot_owner:
    label: Owners
    description: HubSpot owners and users who can be assigned to CRM records.
    grain: id (one row per owner)
    type: dimension
    primary_time_column: created_at
    notes: Use this table to label assigned owners in contacts, companies, deals, and tickets when those tables expose hubspot_owner_id.
    metrics:
      owners:
        sql: "count(*)"
        description: Count of owners.
      active_owners:
        sql: "count(*) filter (where archived = false)"
        description: Count of non-archived owners.
      archived_owners:
        sql: "count(*) filter (where archived = true)"
        description: Count of archived owners.
    dimensions:
      owner_email:
        column: email
        description: Owner email address.
      owner_created_month:
        sql: "date_trunc('month', created_at)"
        description: Calendar month of owner creation.
    common_filters:
      - label: Active only
        sql: archived = false
    caveats:
      - teams is a JSON field and may need JSON operators for team-level analysis.
    columns:
      id:
        label: Owner ID
        type: primary_key
        description: Unique HubSpot owner ID.
      portal_id:
        description: HubSpot portal or account ID.
      email:
        label: Email
        type: dimension
        description: Owner email address.
      first_name:
        description: Owner first name.
      last_name:
        description: Owner last name.
      user_id:
        description: HubSpot user ID associated with the owner.
      teams:
        type: json
        description: JSON teams associated with the owner.
      created_at:
        label: Created Date
        type: date
        grain: day
        description: Owner creation timestamp.
      updated_at:
        description: Owner last update timestamp.
      archived:
        label: Archived
        type: dimension
        description: Whether the owner is archived.

  hubspot_blog_post:
    label: Blog Posts
    description: HubSpot CMS blog posts, including publish state, language, author, campaign, domain, URL, and publication timestamps.
    grain: id (one row per blog post)
    type: dimension
    primary_time_column: created
    notes: Use this table for content inventory, publication status, localization, authoring, and URL questions.
    metrics:
      blog_posts:
        sql: "count(*)"
        description: Count of blog posts.
      published_blog_posts:
        sql: "count(*) filter (where currently_published = true)"
        description: Count of currently published blog posts.
      archived_blog_posts:
        sql: "count(*) filter (where archived = true)"
        description: Count of archived blog posts.
    dimensions:
      created_month:
        sql: "date_trunc('month', created)"
        description: Calendar month of blog post creation.
      publish_month:
        sql: "date_trunc('month', publish_date)"
        description: Calendar month of scheduled or actual publication.
      post_state:
        column: state
        description: Blog post state.
      language:
        column: language
        description: Blog post language code.
      author_name:
        column: author_name
        description: Blog post author name.
      domain:
        column: domain
        description: Domain where the post resolves.
    common_filters:
      - label: Published only
        sql: currently_published = true
      - label: Active only
        sql: archived = false
    caveats:
      - post_body and HTML fields can be large; avoid selecting them unless needed.
      - URL and domain behavior depends on CMS domain configuration.
    columns:
      id:
        label: Blog Post ID
        type: primary_key
        description: Unique HubSpot blog post ID.
      portal_id:
        description: HubSpot portal or account ID.
      name:
        label: Name
        description: Internal blog post name.
      html_title:
        label: HTML Title
        description: HTML title of the blog post.
      slug:
        label: Slug
        description: Path slug appended to the domain.
      url:
        label: URL
        description: Generated blog post URL.
      state:
        label: State
        type: dimension
        description: Blog post state.
      currently_published:
        label: Currently Published
        type: dimension
        description: Whether the blog post is currently published.
      author_name:
        label: Author
        type: dimension
        description: Name of the blog post author.
      language:
        type: dimension
        description: Blog post language code.
      created:
        label: Created Date
        type: date
        grain: day
        description: Blog post creation timestamp.
      updated:
        description: Blog post last update timestamp.
      publish_date:
        label: Publish Date
        type: date
        grain: day
        description: Blog post publish date.
      archived:
        label: Archived
        type: dimension
        description: Whether the blog post is archived.

  hubspot_domain:
    label: Domains
    description: HubSpot CMS and tracking domains, including primary-use flags, DNS/SSL status, resolving status, brand, and CDN configuration.
    grain: id (one row per domain)
    type: dimension
    primary_time_column: created
    notes: Use this table for CMS domain configuration, SSL, DNS, and primary-domain checks.
    metrics:
      domains:
        sql: "count(*)"
        description: Count of domains.
      resolving_domains:
        sql: "count(*) filter (where is_resolving = true)"
        description: Count of resolving domains.
      ssl_enabled_domains:
        sql: "count(*) filter (where is_ssl_enabled = true)"
        description: Count of domains with SSL enabled.
      primary_domains:
        sql: "count(*) filter (where is_any_primary = true)"
        description: Count of domains marked primary for any content type.
    dimensions:
      domain:
        column: domain
        description: Domain name.
      created_month:
        sql: "date_trunc('month', created)"
        description: Calendar month of domain creation.
      apex_domain:
        column: apex_domain
        description: Apex domain.
      public_suffix:
        column: public_suffix
        description: Public suffix.
    common_filters:
      - label: Resolving only
        sql: is_resolving = true
      - label: SSL enabled
        sql: is_ssl_enabled = true
      - label: Primary only
        sql: is_any_primary = true
    caveats:
      - Some DNS and CDN details are JSON fields and may need JSON operators for detailed inspection.
    columns:
      id:
        label: Domain ID
        type: primary_key
        description: Unique HubSpot domain ID.
      portal_id:
        description: HubSpot portal or account ID.
      domain:
        label: Domain
        type: dimension
        description: Domain name.
      is_resolving:
        label: Resolving
        type: dimension
        description: Whether the domain resolves.
      is_dns_correct:
        label: DNS Correct
        type: dimension
        description: Whether DNS is configured correctly.
      is_ssl_enabled:
        label: SSL Enabled
        type: dimension
        description: Whether SSL is enabled.
      is_any_primary:
        label: Any Primary
        type: dimension
        description: Whether the domain is primary for any content type.
      created:
        label: Created Date
        type: date
        grain: day
        description: Domain creation timestamp.
      updated:
        description: Domain last update timestamp.

  hubspot_hub_db:
    label: HubDB Tables
    description: Published HubDB table metadata, including table names, columns, row counts, publication status, and dynamic-page flags.
    grain: id (one row per HubDB table)
    type: dimension
    primary_time_column: created_at
    notes: Use this table for HubDB inventory and metadata. It does not expose every row from each HubDB table.
    metrics:
      hubdb_tables:
        sql: "count(*)"
        description: Count of HubDB tables.
      published_tables:
        sql: "count(*) filter (where published = true)"
        description: Count of published HubDB tables.
      archived_tables:
        sql: "count(*) filter (where archived = true)"
        description: Count of archived HubDB tables.
      total_rows:
        sql: "sum(row_count)"
        description: Total HubDB rows across tables.
    dimensions:
      table_name:
        column: name
        description: HubDB table name.
      published:
        column: published
        description: Published status.
      created_month:
        sql: "date_trunc('month', created_at)"
        description: Calendar month of HubDB table creation.
    common_filters:
      - label: Published only
        sql: published = true
      - label: Active only
        sql: archived = false
    caveats:
      - columns, created_by, updated_by, and dynamic_meta_tags are JSON fields.
      - row_count is metadata and can differ from row-level query results if the source changes during a query.
    columns:
      id:
        label: HubDB Table ID
        type: primary_key
        description: Unique HubDB table ID.
      portal_id:
        description: HubSpot portal or account ID.
      name:
        label: Name
        type: dimension
        description: HubDB table name.
      label:
        description: HubDB table label.
      row_count:
        label: Rows
        type: metric
        description: Number of rows in the table.
      column_count:
        label: Columns
        type: metric
        description: Number of columns including deleted columns.
      published:
        type: dimension
        description: Whether the table is published.
      use_for_pages:
        type: dimension
        description: Whether the table can be used for dynamic pages.
      created_at:
        label: Created Date
        type: date
        grain: day
        description: HubDB table creation timestamp.
      updated_at:
        description: HubDB table last update timestamp.
      archived:
        label: Archived
        type: dimension
        description: Whether the table is archived.
