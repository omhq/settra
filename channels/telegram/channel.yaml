key: telegram
name: Telegram
description: Chat with Settra through a Telegram bot.
provider_module: provider
provider_class: TelegramProvider
delivery_modes:
  - webhook
  - polling
fields:
  - key: bot_token
    label: Bot Token
    type: secret
    required: true
    help: Token from BotFather.
  - key: webhook_secret_token
    label: Webhook Secret Token
    type: secret
    required: false
    help: Optional value Telegram sends as X-Telegram-Bot-Api-Secret-Token.
  - key: allowed_chat_ids
    label: Allowed Chat IDs
    type: text
    required: false
    help: Optional comma-separated Telegram chat IDs allowed to use this channel.
  - key: progress_mode
    label: Progress Mode
    type: text
    required: false
    default: compact
    help: Use silent, compact, or verbose for mobile progress updates.
