#cloud-config
package_update: true
package_upgrade: false

packages:
  - ca-certificates
  - curl
  - docker.io
  - docker-compose-v2
  - openssl

bootcmd:
  - mkdir -p /opt/settra

write_files:
  - path: /opt/settra/docker-compose.yml
    owner: root:root
    permissions: "0644"
    content: |
      services:
        caddy:
          image: caddy:2
          pull_policy: always
          restart: unless-stopped
          ports:
            - "80:80"
            - "443:443"
          volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile:ro
            - caddy_data:/data
            - caddy_config:/config
          depends_on:
            - app

        app:
          image: ${SETTRA_IMAGE:-omhq/settra:0.0.1}
          pull_policy: always
          restart: unless-stopped
          environment:
            - STEAMPIPE_HOST=steampipe
            - STEAMPIPE_PORT=9193
            - STEAMPIPE_CONFIG_DIR=/steampipe/config
            - STEAMPIPE_DB_PASSWORD=${STEAMPIPE_DB_PASSWORD}
            - DATA_DIR=/data
            - CONNECTORS_DIR=/config/connectors
            - CUBE_API_URL=http://cube:4000/cubejs-api
            - CUBE_API_SECRET=${CUBEJS_API_SECRET}
            - CUBE_MODEL_DIR=/cube/conf/model
            - CUBE_BUNDLED_MODEL_SYNC_MODE=${CUBE_BUNDLED_MODEL_SYNC_MODE:-missing}
            - SETTRA_PUBLIC_URL=https://${SITE_HOST}
            - SETTRA_OAUTH_ENABLED=${SETTRA_OAUTH_ENABLED:-true}
            - SETTRA_OAUTH_ADMIN_USER=${SETTRA_OAUTH_ADMIN_USER}
            - SETTRA_OAUTH_ADMIN_PASSWORD=${SETTRA_OAUTH_ADMIN_PASSWORD}
            - SETTRA_OAUTH_REDIRECT_HOSTS=${SETTRA_OAUTH_REDIRECT_HOSTS:-chatgpt.com}
            - MCP_ALLOWED_HOSTS=${SITE_HOST},${SITE_HOST}:443
            - MCP_ALLOWED_ORIGINS=https://${SITE_HOST},https://chatgpt.com,https://chat.openai.com,https://platform.openai.com
            - CORS_ALLOWED_ORIGINS=https://${SITE_HOST}
            - SECRET_KEY=${SECRET_KEY}
            - LOG_LEVEL=${LOG_LEVEL:-INFO}
            - STATIC_DIR=/opt/static
          volumes:
            - settra_data:/data
            - steampipe_config:/steampipe/config
            - cube_conf:/cube/conf
            - semantic_overlays:/cube/conf/model/overlays
            - /var/run/docker.sock:/var/run/docker.sock
          depends_on:
            - steampipe

        cube:
          image: ${CUBE_IMAGE:-cubejs/cube:latest}
          pull_policy: always
          restart: unless-stopped
          environment:
            - CUBEJS_DB_TYPE=postgres
            - CUBEJS_DB_HOST=steampipe
            - CUBEJS_DB_PORT=9193
            - CUBEJS_DB_NAME=steampipe
            - CUBEJS_DB_USER=steampipe
            - CUBEJS_DB_PASS=${STEAMPIPE_DB_PASSWORD}
            - CUBEJS_API_SECRET=${CUBEJS_API_SECRET}
            - CUBEJS_DEV_MODE=${CUBEJS_DEV_MODE:-true}
            - CUBEJS_SCHEMA_PATH=model
            - CUBEJS_LOG_LEVEL=${CUBEJS_LOG_LEVEL:-warn}
            - CUBEJS_CACHE_AND_QUEUE_DRIVER=memory
          volumes:
            - cube_conf:/cube/conf
            - semantic_overlays:/cube/conf/model/overlays:ro
          depends_on:
            - app
            - steampipe

        steampipe:
          image: ${SETTRA_STEAMPIPE_IMAGE:-omhq/settra-steampipe:0.0.1}
          pull_policy: always
          restart: unless-stopped
          environment:
            - STEAMPIPE_DATABASE_PASSWORD=${STEAMPIPE_DB_PASSWORD}
            - CONNECTORS_DIR=/config/connectors
          volumes:
            - steampipe_config:/home/steampipe/.steampipe/config
            - steampipe_db:/home/steampipe/.steampipe/db
            - steampipe_plugins:/home/steampipe/.steampipe/plugins

      volumes:
        caddy_data:
        caddy_config:
        settra_data:
        cube_conf:
        semantic_overlays:
        steampipe_config:
        steampipe_db:
        steampipe_plugins:

runcmd:
  - systemctl enable --now docker
  - |
    set -eu
    cd /opt/settra

    if [ ! -f .env ]; then
      public_ipv4="$(curl -fsS http://169.254.169.254/hetzner/v1/metadata/public-ipv4 || curl -fsS https://api.ipify.org)"
      public_ipv4_dashes="$(printf '%s' "$public_ipv4" | tr '.' '-')"
      site_host="settra-${public_ipv4_dashes}.sslip.io"
      basic_auth_user="settra"
      basic_auth_password="$(openssl rand -hex 24 | tr -d '\n')"

      {
        printf 'SECRET_KEY=%s\n' "$(openssl rand -hex 32)"
        printf 'STEAMPIPE_DB_PASSWORD=%s\n' "$(openssl rand -hex 24)"
        printf 'CUBEJS_API_SECRET=%s\n' "$(openssl rand -hex 32)"
        printf 'SITE_HOST=%s\n' "$site_host"
        printf 'BASIC_AUTH_USER=%s\n' "$basic_auth_user"
        printf 'BASIC_AUTH_PASSWORD=%s\n' "$basic_auth_password"
        printf 'SETTRA_PUBLIC_URL=https://%s\n' "$site_host"
        printf 'SETTRA_OAUTH_ENABLED=true\n'
        printf 'SETTRA_OAUTH_ADMIN_USER=%s\n' "$basic_auth_user"
        printf 'SETTRA_OAUTH_ADMIN_PASSWORD=%s\n' "$basic_auth_password"
        printf 'SETTRA_OAUTH_REDIRECT_HOSTS=chatgpt.com\n'
        printf 'CUBE_BUNDLED_MODEL_SYNC_MODE=missing\n'
        printf 'CUBEJS_DEV_MODE=true\n'
        printf 'LOG_LEVEL=INFO\n'
        printf 'SETTRA_IMAGE=omhq/settra:0.0.1\n'
        printf 'SETTRA_STEAMPIPE_IMAGE=omhq/settra-steampipe:0.0.1\n'
        printf 'CUBE_IMAGE=cubejs/cube:latest\n'
      } > .env
      chmod 0600 .env

      {
        printf 'Settra URL: https://%s\n' "$site_host"
        printf 'ChatGPT Connector URL: https://%s/mcp\n' "$site_host"
        printf 'Basic Auth username: %s\n' "$basic_auth_user"
        printf 'Basic Auth password: %s\n' "$basic_auth_password"
        printf 'OAuth login username: %s\n' "$basic_auth_user"
        printf 'OAuth login password: %s\n' "$basic_auth_password"
      } > credentials.txt
      chmod 0600 credentials.txt
    fi

    set -a
    . ./.env
    set +a

    export SETTRA_PUBLIC_URL="${SETTRA_PUBLIC_URL:-https://${SITE_HOST}}"
    export SETTRA_OAUTH_ENABLED="${SETTRA_OAUTH_ENABLED:-true}"
    export SETTRA_OAUTH_ADMIN_USER="${SETTRA_OAUTH_ADMIN_USER:-$BASIC_AUTH_USER}"
    export SETTRA_OAUTH_ADMIN_PASSWORD="${SETTRA_OAUTH_ADMIN_PASSWORD:-$BASIC_AUTH_PASSWORD}"
    export SETTRA_OAUTH_REDIRECT_HOSTS="${SETTRA_OAUTH_REDIRECT_HOSTS:-chatgpt.com}"

    caddy_password_hash="$(docker run --rm caddy:2 caddy hash-password --plaintext "$BASIC_AUTH_PASSWORD")"
    cat > Caddyfile <<EOF
    ${SITE_HOST} {
      handle /.well-known/* {
        reverse_proxy app:8000
      }

      handle /oauth/* {
        reverse_proxy app:8000
      }

      handle /mcp* {
        reverse_proxy app:8000
      }

      handle {
        basic_auth {
          ${BASIC_AUTH_USER} ${caddy_password_hash}
        }
        reverse_proxy app:8000
      }
    }
    EOF

    docker compose pull
    docker compose up -d
    docker compose ps
