services:
  app:
    build: .
    image: ${IMAGE:-omhq/settra:0.0.1}
    ports:
      - "8000:8000"
    environment:
      - STEAMPIPE_HOST=steampipe
      - STEAMPIPE_PORT=9193
      - STEAMPIPE_CONFIG_DIR=/steampipe/config
      - STEAMPIPE_DB_PASSWORD=steampipe_pass
      - DATA_DIR=/data
      - CONNECTORS_DIR=/config/connectors
      - CUBE_API_URL=http://cube:4000/cubejs-api
      - CUBE_API_SECRET=${CUBE_API_SECRET:-cube-dev-secret-change-me}
      - CUBE_MODEL_DIR=/cube/conf/model
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-me}
      - SETTRA_PUBLIC_URL=${SETTRA_PUBLIC_URL:-http://localhost:8000}
      - SETTRA_OAUTH_ENABLED=${SETTRA_OAUTH_ENABLED:-false}
      - SETTRA_OAUTH_ADMIN_USER=${SETTRA_OAUTH_ADMIN_USER:-settra}
      - SETTRA_OAUTH_ADMIN_PASSWORD=${SETTRA_OAUTH_ADMIN_PASSWORD:-settra}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - STATIC_DIR=/opt/static
    volumes:
      - ./backend:/app
      - ./connectors:/config/connectors:ro
      - ./connectors/googlesheets/semantics.yaml:/cube/conf/model/googlesheets.yaml
      - ./connectors/hubspot/semantics.yaml:/cube/conf/model/hubspot.yaml
      - ./connectors/stripe/semantics.yaml:/cube/conf/model/stripe.yaml
      - ./semantic_overlays:/cube/conf/model/overlays
      - steampipe_config:/steampipe/config
      - ./app_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    depends_on:
      - steampipe
      - cube

  cube:
    image: ${CUBE_IMAGE:-cubejs/cube:latest}
    restart: unless-stopped
    environment:
      - CUBEJS_DB_TYPE=postgres
      - CUBEJS_DB_HOST=steampipe
      - CUBEJS_DB_PORT=9193
      - CUBEJS_DB_NAME=steampipe
      - CUBEJS_DB_USER=steampipe
      - CUBEJS_DB_PASS=steampipe_pass
      - CUBEJS_API_SECRET=${CUBE_API_SECRET:-cube-dev-secret-change-me}
      - CUBEJS_DEV_MODE=${CUBEJS_DEV_MODE:-true}
      - CUBEJS_SCHEMA_PATH=model
      - CUBEJS_LOG_LEVEL=${CUBEJS_LOG_LEVEL:-warn}
      - CUBEJS_CACHE_AND_QUEUE_DRIVER=memory
    ports:
      - "4000:4000"
    volumes:
      - ./cube/cube.js:/cube/conf/cube.js:ro
      - ./connectors/googlesheets/semantics.yaml:/cube/conf/model/googlesheets.yaml:ro
      - ./connectors/hubspot/semantics.yaml:/cube/conf/model/hubspot.yaml:ro
      - ./connectors/stripe/semantics.yaml:/cube/conf/model/stripe.yaml:ro
      - ./semantic_overlays:/cube/conf/model/overlays:ro
    depends_on:
      - steampipe

  steampipe:
    build:
      context: .
      dockerfile: Dockerfile.steampipe
      args:
        STEAMPIPE_VERSION: ${STEAMPIPE_VERSION:-2.4.4}
    image: ${STEAMPIPE_IMAGE:-omhq/settra-steampipe:0.0.1}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/usr/local/bin/steampipe-init.sh"]
    environment:
      - STEAMPIPE_DATABASE_PASSWORD=steampipe_pass
      - CONNECTORS_DIR=/config/connectors
    ports:
      - "9193:9193"
    volumes:
      - ./scripts/steampipe-init.sh:/usr/local/bin/steampipe-init.sh:ro
      - ./connectors:/config/connectors:ro
      - steampipe_config:/home/steampipe/.steampipe/config
      - steampipe_db:/home/steampipe/.steampipe/db
      - steampipe_plugins:/home/steampipe/.steampipe/plugins

volumes:
  steampipe_config:
  steampipe_db:
  steampipe_plugins:
