services:
  app:
    build: .
    image: ${IMAGE:-omhq/settra:0.0.1}
    ports:
      - "8000:8000"
    environment:
      - STEAMPIPE_HOST=steampipe
      - STEAMPIPE_PORT=9193
      - STEAMPIPE_CONFIG_DIR=/steampipe/config
      - STEAMPIPE_DB_PASSWORD=steampipe_pass
      - DATA_DIR=/data
      - CONNECTORS_DIR=/config/connectors
      - CHANNELS_DIR=/config/channels
      - MODEL_PROVIDERS_YAML=/config/models/providers.yaml
      - SECRET_KEY=${SECRET_KEY:-dev-secret-change-me}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AGENT_DEBUG=${AGENT_DEBUG:-false}
      - AGENT_LOG_PROMPTS=${AGENT_LOG_PROMPTS:-false}
      - LITELLM_DEBUG=${LITELLM_DEBUG:-false}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-}
      - STATIC_DIR=/opt/static
    volumes:
      - ./backend:/app
      - ./prompts:/config/prompts:ro
      - ./connectors:/config/connectors:ro
      - ./channels:/config/channels:ro
      - ./models:/config/models:ro
      - steampipe_config:/steampipe/config
      - ./app_data:/data
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    depends_on:
      - steampipe

  steampipe:
    build:
      context: .
      dockerfile: Dockerfile.steampipe
      args:
        STEAMPIPE_VERSION: ${STEAMPIPE_VERSION:-2.4.4}
    image: ${STEAMPIPE_IMAGE:-omhq/settra-steampipe:0.0.1}
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/usr/local/bin/steampipe-init.sh"]
    environment:
      - STEAMPIPE_DATABASE_PASSWORD=steampipe_pass
      - CONNECTORS_DIR=/config/connectors
    ports:
      - "9193:9193"
    volumes:
      - ./scripts/steampipe-init.sh:/usr/local/bin/steampipe-init.sh:ro
      - ./connectors:/config/connectors:ro
      - steampipe_config:/home/steampipe/.steampipe/config
      - steampipe_db:/home/steampipe/.steampipe/db
      - steampipe_plugins:/home/steampipe/.steampipe/plugins

volumes:
  steampipe_config:
  steampipe_db:
  steampipe_plugins:
