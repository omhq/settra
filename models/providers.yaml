providers:
  openai:
    name: OpenAI
    description: OpenAI models
    model_prefix: ""
    fields:
      - key: api_key
        label: API Key
        type: secret
        required: true
        placeholder: sk-...
      - key: model
        label: Model
        type: text
        required: true
        placeholder: gpt-4o-mini
      - key: temperature
        label: Temperature
        type: number
        default: 0
        min: 0
        max: 2
      - key: max_tokens
        label: Max Tokens
        type: number
        required: false
      - key: api_base
        label: API Base
        type: text
        required: false

  anthropic:
    name: Anthropic
    description: Anthropic Claude models
    model_prefix: anthropic/
    fields:
      - key: api_key
        label: API Key
        type: secret
        required: true
        placeholder: sk-ant-...
      - key: model
        label: Model
        type: text
        required: true
        placeholder: claude-...
      - key: temperature
        label: Temperature
        type: number
        default: 0
        min: 0
        max: 1
      - key: max_tokens
        label: Max Tokens
        type: number
        required: false

  openrouter:
    name: OpenRouter
    description: OpenRouter-hosted models
    model_prefix: openrouter/
    fields:
      - key: api_key
        label: API Key
        type: secret
        required: true
      - key: model
        label: Model
        type: text
        required: true
        placeholder: openai/gpt-4o-mini
      - key: temperature
        label: Temperature
        type: number
        default: 0
        min: 0
        max: 2
